version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: buildcycle
      POSTGRES_PASSWORD: buildcycle
      POSTGRES_DB: buildcycle
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildcycle"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://buildcycle:buildcycle@postgres:5432/buildcycle
      PORT: "3001"
      JWT_SECRET: dev-secret-change-in-production
      SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
      SOROBAN_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
      BATCH_TOKEN_ID: ""
      ESCROW_ID: ""
      COMMUNITY_POOL_ID: ""
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_SOROBAN_RPC_URL: https://soroban-testnet.stellar.org
    depends_on:
      - backend

volumes:
  pgdata:
